name: RCSI News Digest

on:
  # Runs at 9pm UTC daily (7am AEST / 8am AEDT)
  schedule:
    - cron: "0 21 * * *"
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news monitor
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          AFR_EMAIL: ${{ secrets.AFR_EMAIL }}
          AFR_PASSWORD: ${{ secrets.AFR_PASSWORD }}
          AUSTRALIAN_EMAIL: ${{ secrets.AUSTRALIAN_EMAIL }}
          AUSTRALIAN_PASSWORD: ${{ secrets.AUSTRALIAN_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EXCEL_PATH: news_log.xlsx
        run: python pe_news_monitor.py

      - name: Commit updated Excel log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news_log.xlsx
          git diff --cached --quiet || git commit -m "Update news log — $(date -u +'%Y-%m-%d')"
          git push
